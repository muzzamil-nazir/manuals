<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Manual Upload System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="login">
    <main class="auth-shell">
      <section class="auth-card glass-card">
        <div class="auth-header">
          <h1>Sign In</h1>
          <p>Access your manual upload dashboard securely.</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Enter your password" required />
          </div>
          <button type="submit" class="primary-btn auth-submit">Login</button>
        </form>

        <div id="authMessage" class="message"></div>

        <p class="auth-footer">
          New here? <a href="register.html">Create an account</a>
        </p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
