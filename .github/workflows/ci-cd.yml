name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-check:
    name: Backend syntax and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          npm install

      - name: Run backend syntax check
        working-directory: backend
        run: |
          node -c server.js

      - name: Verify backend startup file exists
        working-directory: backend
        run: |
          test -f server.js

  deploy:
    name: Trigger deployment hooks
    runs-on: ubuntu-latest
    needs: backend-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy webhook
        if: ${{ secrets.RENDER_DEPLOY_WEBHOOK != '' }}
        run: |
          curl -X POST -H 'Content-Type: application/json' "$RENDER_DEPLOY_WEBHOOK"
        env:
          RENDER_DEPLOY_WEBHOOK: ${{ secrets.RENDER_DEPLOY_WEBHOOK }}

      - name: Trigger Railway deploy webhook
        if: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK != '' }}
        run: |
          curl -X POST -H 'Content-Type: application/json' "$RAILWAY_DEPLOY_WEBHOOK"
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}

      - name: Trigger Vercel deploy hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST -H 'Content-Type: application/json' "$VERCEL_DEPLOY_HOOK"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Netlify deploy hook
        if: ${{ secrets.NETLIFY_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST -H 'Content-Type: application/json' "$NETLIFY_DEPLOY_HOOK"
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
